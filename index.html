<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LKW Protokoll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div class="max-w-md mx-auto space-y-4">
        <header class="bg-white p-4 rounded-2xl shadow flex justify-center border-b-4 border-green-700">
             <img src="https://ih1.redbubble.net/image.761262054.2536/flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="h-16">
        </header>

        <div class="bg-white p-6 rounded-[2rem] shadow-lg space-y-4">
            <input type="text" id="lkw" placeholder="LKW KENNZEICHEN" class="w-full border-2 p-3 rounded-xl font-bold uppercase outline-none focus:border-purple-600">
            <input type="text" id="trailer" placeholder="TRAILER KENNZEICHEN" class="w-full border-2 p-3 rounded-xl font-bold uppercase outline-none focus:border-purple-600">
            <textarea id="info" placeholder="BEMERKUNG" class="w-full border-2 p-3 rounded-xl outline-none" rows="2"></textarea>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('cam-tank').click()" class="bg-purple-700 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow">Tank Foto</button>
                <button onclick="document.getElementById('cam-schaden').click()" class="bg-purple-700 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow">Schaden (+)</button>
            </div>
            <div id="status" class="text-center text-xs font-bold text-green-600 uppercase"></div>
        </div>

        <button onclick="generatePDF()" id="btn-submit" class="w-full bg-green-800 text-white font-black py-6 rounded-[2rem] text-xl shadow-2xl uppercase">
            PDF Erstellen
        </button>

        <div id="download-area" class="hidden space-y-4 p-6 bg-white rounded-[2rem] shadow-xl border-4 border-blue-500">
            <p class="text-center font-bold text-blue-600 uppercase">PDF IST BEREIT!</p>
            
            <a id="direct-link" href="" target="_blank" rel="noopener noreferrer" class="block w-full bg-blue-600 text-white text-center py-5 rounded-2xl font-black uppercase shadow-lg">
                HIER KLICKEN ZUM SENDEN
            </a>
            
            <p class="text-[10px] text-gray-500 text-center">Tipp: Wenn kein Menü kommt, Link gedrückt halten!</p>
        </div>
    </div>

    <input type="file" id="cam-tank" accept="image/*" capture="environment" class="hidden">
    <input type="file" id="cam-schaden" accept="image/*" capture="environment" class="hidden">

    <script>
        const { jsPDF } = window.jspdf;
        let pTank = null, pSchaden = [];

        document.getElementById('cam-tank').onchange = e => {
            const r = new FileReader(); r.onload = ev => { pTank = ev.target.result; msg("Tank OK ✅"); }; r.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('cam-schaden').onchange = e => {
            const r = new FileReader(); r.onload = ev => { pSchaden.push(ev.target.result); msg(pSchaden.length + " Schaden OK ✅"); }; r.readAsDataURL(e.target.files[0]);
        };
        function msg(t) { document.getElementById('status').innerText = t; }

        function generatePDF() {
            const l = document.getElementById('lkw').value.toUpperCase().trim() || "LKW";
            const t = document.getElementById('trailer').value.toUpperCase().trim() || "TRAILER";

            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("LKW PROTOKOLL", 20, 25);
            doc.setFontSize(12); doc.text(`LKW: ${l} | Trailer: ${t}`, 20, 40);
            doc.text(`Datum: ${new Date().toLocaleString('de-DE')}`, 20, 50);

            if(pTank) doc.addImage(pTank, 'JPEG', 20, 60, 60, 45);
            pSchaden.forEach((img) => { doc.addPage(); doc.addImage(img, 'JPEG', 10, 10, 180, 140); });

            // DER TRICK: Wir nutzen das "Data-URI" Format. Das ist kein Link zu einer Datei, 
            // sondern die Datei SELBST als langer Textstring.
            const pdfBase64 = doc.output('datauristring');
            
            document.getElementById('btn-submit').classList.add('hidden');
            document.getElementById('download-area').classList.remove('hidden');
            
            const link = document.getElementById('direct-link');
            link.href = pdfBase64;
            link.setAttribute("download", `Protokoll_${l}.pdf`);

            // Wir versuchen trotzdem das Teilen-Menü zu triggern, falls das Handy es kann
            link.onclick = (event) => {
                if (navigator.share) {
                    const blob = doc.output('blob');
                    const file = new File([blob], `Protokoll_${l}.pdf`, { type: 'application/pdf' });
                    navigator.share({ files: [file] }).catch(() => {
                        // Falls Share scheitert, lassen wir den Link-Klick (Öffnen/Download) einfach durchlaufen
                    });
                }
            };
        }
    </script>
</body>
</html>
