<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LKW Protokoll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans p-4">

    <div class="max-w-md mx-auto space-y-4 text-center">
        <header class="bg-white p-4 rounded-2xl shadow border-b-4 border-green-700 flex justify-center">
             <img src="https://ih1.redbubble.net/image.761262054.2536/flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="h-16">
        </header>

        <div class="bg-white p-6 rounded-[2rem] shadow-lg space-y-4 text-left border border-slate-200">
            <input type="text" id="lkw" placeholder="LKW KENNZEICHEN" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold uppercase outline-none focus:border-purple-600">
            <input type="text" id="trailer" placeholder="TRAILER KENNZEICHEN" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold uppercase outline-none focus:border-purple-600">
            <textarea id="info" placeholder="BEMERKUNG" class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-purple-600" rows="2"></textarea>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('cam-tank').click()" class="bg-purple-700 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow">Tank Foto</button>
                <button onclick="document.getElementById('cam-schaden').click()" class="bg-purple-700 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow">Schaden (+)</button>
            </div>
            
            <div id="status" class="text-xs font-bold text-gray-500 text-center"></div>
        </div>

        <button onclick="generatePDF()" id="btn-submit" class="w-full bg-green-800 text-white font-black py-6 rounded-[2rem] text-xl shadow-2xl active:scale-95 transition-all uppercase">
            PDF Erstellen
        </button>

        <div id="backup-zone" class="hidden space-y-3 p-4 bg-yellow-100 rounded-2xl border-2 border-yellow-400 text-sm font-bold">
            <p>PDF ist fertig! Klicke hier zum Senden:</p>
            <button id="btn-share-final" class="w-full bg-blue-600 text-white py-4 rounded-xl uppercase shadow-lg">Jetzt an WhatsApp senden</button>
        </div>
    </div>

    <input type="file" id="cam-tank" accept="image/*" capture="environment" class="hidden">
    <input type="file" id="cam-schaden" accept="image/*" capture="environment" class="hidden">

    <script>
        const { jsPDF } = window.jspdf;
        let photoTank = null;
        let photosSchaden = [];

        document.getElementById('cam-tank').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { photoTank = ev.target.result; document.getElementById('status').innerText = "Tank-Foto bereit!"; };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('cam-schaden').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { photosSchaden.push(ev.target.result); document.getElementById('status').innerText = photosSchaden.length + " Schaden-Fotos bereit!"; };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function generatePDF() {
            const lkw = document.getElementById('lkw').value.toUpperCase().trim();
            const trailer = document.getElementById('trailer').value.toUpperCase().trim();
            if(!lkw || !trailer) return alert("Bitte Kennzeichen eingeben!");

            document.getElementById('btn-submit').innerText = "Wird erstellt...";
            
            const doc = new jsPDF();
            doc.text("LKW PROTOKOLL", 20, 20);
            doc.text(`LKW: ${lkw} | Trailer: ${trailer}`, 20, 30);
            doc.text(`Datum: ${new Date().toLocaleString()}`, 20, 40);
            doc.text("Info: " + document.getElementById('info').value, 20, 50);

            if(photoTank) doc.addImage(photoTank, 'JPEG', 20, 60, 50, 40);
            photosSchaden.forEach((img, i) => { doc.addPage(); doc.addImage(img, 'JPEG', 20, 20, 160, 120); });

            const pdfBlob = doc.output('blob');
            const fileName = `Protokoll_${lkw}.pdf`;
            const file = new File([pdfBlob], fileName, { type: 'application/pdf' });

            // Jetzt zeigen wir den Share-Button an
            document.getElementById('btn-submit').classList.add('hidden');
            const bZone = document.getElementById('backup-zone');
            bZone.classList.remove('hidden');

            document.getElementById('btn-share-final').onclick = async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({ files: [file], title: 'LKW Protokoll' });
                    } catch (e) {
                        doc.save(fileName); // Fallback: Download
                    }
                } else {
                    doc.save(fileName); // Fallback: Download
                }
            };
        }
    </script>
</body>
</html>
