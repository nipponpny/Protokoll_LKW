<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LKW Protokoll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 font-sans">

    <div class="max-w-md mx-auto space-y-4">
        <header class="bg-white p-4 rounded-2xl shadow flex justify-center border-b-4 border-green-700">
             <img src="https://ih1.redbubble.net/image.761262054.2536/flat,750x,075,f-pad,750x1000,f8f8f8.jpg" class="h-16">
        </header>

        <div class="bg-white p-6 rounded-[2rem] shadow-lg space-y-4">
            <input type="text" id="lkw" placeholder="LKW KENNZEICHEN" class="w-full border-2 p-3 rounded-xl font-bold uppercase outline-none focus:border-purple-600">
            <input type="text" id="trailer" placeholder="TRAILER KENNZEICHEN" class="w-full border-2 p-3 rounded-xl font-bold uppercase outline-none focus:border-purple-600">
            <textarea id="info" placeholder="BEMERKUNG" class="w-full border-2 p-3 rounded-xl outline-none focus:border-purple-600" rows="2"></textarea>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('cam-tank').click()" class="bg-purple-700 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow active:bg-purple-900">Tank Foto</button>
                <button onclick="document.getElementById('cam-schaden').click()" class="bg-purple-700 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow active:bg-purple-900">Schaden (+)</button>
            </div>
            <div id="status" class="text-center text-xs font-bold text-green-600"></div>
        </div>

        <button onclick="generatePDF()" id="btn-submit" class="w-full bg-green-800 text-white font-black py-6 rounded-[2rem] text-xl shadow-2xl uppercase active:bg-green-950">
            PDF Erstellen
        </button>

        <div id="download-area" class="hidden space-y-4 p-6 bg-white rounded-[2rem] shadow-xl border-2 border-green-600 animate-bounce">
            <p class="text-center font-bold text-red-600">PDF FERTIG!</p>
            <a id="direct-link" href="#" target="_blank" class="block w-full bg-blue-600 text-white text-center py-5 rounded-2xl font-black uppercase shadow-lg">
                Senden / Öffnen
            </a>
            <p class="text-[10px] text-gray-400 text-center uppercase">Falls kein Menü kommt: Link kurz gedrückt halten!</p>
        </div>
    </div>

    <input type="file" id="cam-tank" accept="image/*" capture="environment" class="hidden">
    <input type="file" id="cam-schaden" accept="image/*" capture="environment" class="hidden">

    <script>
        const { jsPDF } = window.jspdf;
        let pTank = null, pSchaden = [];

        // Fotos verarbeiten
        document.getElementById('cam-tank').onchange = e => {
            if(!e.target.files[0]) return;
            const r = new FileReader(); r.onload = ev => { pTank = ev.target.result; msg("Tank-Foto OK ✅"); }; r.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('cam-schaden').onchange = e => {
            if(!e.target.files[0]) return;
            const r = new FileReader(); r.onload = ev => { pSchaden.push(ev.target.result); msg(pSchaden.length + " Schaden-Fotos OK ✅"); }; r.readAsDataURL(e.target.files[0]);
        };
        function msg(t) { document.getElementById('status').innerText = t; }

        async function generatePDF() {
            const l = document.getElementById('lkw').value.toUpperCase().trim();
            const t = document.getElementById('trailer').value.toUpperCase().trim();
            const info = document.getElementById('info').value.trim() || "Keine Bemerkungen";

            if(!l || !t) return alert("Bitte LKW und Trailer Kennzeichen eingeben!");

            msg("PDF wird generiert...");
            const doc = new jsPDF();
            
            // Design
            doc.setFontSize(22); doc.setTextColor(0, 70, 0); doc.text("LKW PROTOKOLL", 20, 25);
            doc.setDrawColor(0, 70, 0); doc.line(20, 30, 190, 30);
            
            doc.setFontSize(12); doc.setTextColor(0, 0, 0);
            doc.text(`Datum: ${new Date().toLocaleString('de-DE')}`, 20, 45);
            doc.setFont("helvetica", "bold");
            doc.text(`LKW: ${l}`, 20, 55);
            doc.text(`Trailer: ${t}`, 20, 65);
            doc.setFont("helvetica", "normal");
            doc.text(`Bemerkung:`, 20, 80);
            doc.text(info, 20, 88, { maxWidth: 170 });

            // Bilder hinzufügen
            let y = 110;
            if(pTank) {
                doc.text("Tank-Foto:", 20, y - 5);
                doc.addImage(pTank, 'JPEG', 20, y, 70, 50);
                y += 70;
            }
            
            pSchaden.forEach((img, index) => {
                if (y > 220) { doc.addPage(); y = 30; }
                doc.text(`Schaden-Foto ${index + 1}:`, 20, y - 5);
                doc.addImage(img, 'JPEG', 20, y, 70, 50);
                y += 70;
            });

            // Datei-Erzeugung
            const pdfBlob = doc.output('blob');
            const pdfUrl = URL.createObjectURL(pdfBlob);
            const fileName = `Protokoll_${l}.pdf`;
            
            // Button-Umschaltung
            document.getElementById('btn-submit').classList.add('hidden');
            const area = document.getElementById('download-area');
            area.classList.remove('hidden');
            
            const link = document.getElementById('direct-link');
            link.href = pdfUrl;
            link.download = fileName;

            // Klick-Logik für maximale Kompatibilität
            link.onclick = async (e) => {
                const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'LKW Protokoll',
                            text: `Protokoll ${l} / ${t}`
                        });
                        e.preventDefault(); // Verhindert Download wenn Share klappt
                    } catch (err) {
                        // Fallback: Link öffnet PDF im neuen Tab (Samsung Fix)
                        console.log("Share failed, using default link behavior");
                    }
                }
            };
            msg("Bereit zum Senden!");
        }
    </script>
</body>
</html>
